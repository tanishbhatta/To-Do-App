<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.3.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="todo-app">
            <h1>To-Do App</h1>
            <div class="top-container">
                <h3>Keep it up!</h3>
                <div class="progress-span">
                    <progress value="0" max="100" class="progress-bar">
                    </progress>
                    <span class="full-fill">2/3</span>
                </div>
            </div>
            <form class="text-area">
                <input type="text" id="add-task" placeholder="Add a task..." class="insert-task">
                <button type="submit" id="task-btn"><i class="fa-solid fa-plus"></i></button>
            </form>
            <div class="todos-container">
                <ul id="task-list">
                </ul>
            </div>   
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
